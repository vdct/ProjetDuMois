version: '3.4'

volumes:
  osm-postgis-data:
  settings-data:
  import_done:
  import_queue:
  import_runners:
  cache:

services:
  db:
    image: kartoza/postgis:${POSTGRES_VERSION}
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASS=${POSTGRES_PASS}
      - POSTGRES_DBNAME=${POSTGRES_DBNAME}
      - ALLOW_IP_RANGE=${ALLOW_IP_RANGE}
      - FORCE_SSL=${FORCE_SSL}
    volumes:
      - osm-postgis-data:/var/lib/postgresql
      - settings-data:/home/settings
    healthcheck:
      test: "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DBNAME} -h db"

  osmupdate:
    image: panieravide/projetdumois:osmupdate-latest
    volumes:
      - settings-data:/home/settings
      - import_done:/home/import_done
      - import_queue:/home/import_queue
      - import_runners:/home/import_runners
      - cache:/home/cache
    depends_on:
      db:
        condition: service_healthy
    environment:
      - MAX_DAYS=${MAX_DAYS}
      - DIFF=${DIFF}
      - MAX_MERGE=${MAX_MERGE}
      - COMPRESSION_LEVEL=${COMPRESSION_LEVEL}
      - BASE_URL=${BASE_URL}
      - IMPORT_QUEUE=${IMPORT_QUEUE}
      - IMPORT_RUNNERS=${IMPORT_RUNNERS}
      - IMPORT_DONE=${IMPORT_DONE}
      - RUNNER_IMPOSM_TIME=${RUNNER_IMPOSM_TIME}
      - SETTINGS=${SETTINGS}
    restart: on-failure

  pbfupdate:
    image: panieravide/projetdumois:pbfupdate-latest
    volumes:
      - settings-data:/home/settings
      - import_done:/home/import_done
      - import_runners:/home/import_runners
    environment:
      - IMPORT_RUNNERS=${IMPORT_RUNNERS}
      - IMPORT_DONE=${IMPORT_DONE}
      - RUNNER_PBFUPDATE_TIME=${RUNNER_PBFUPDATE_TIME}
      - SETTINGS=${SETTINGS}
    restart: on-failure
